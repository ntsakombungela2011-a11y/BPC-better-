name: Tests

on:
  push:
    paths:
      - 'lib/**'
      - '!lib/l10n/**'
      - 'test/**'
      - 'pubspec.yaml'
    branches:
      - main
  pull_request:
    paths:
      - 'lib/**'
      - '!lib/l10n/**'
      - 'test/**'
      - 'pubspec.yaml'
    branches:
      - main

# Declare default permissions as read only.
permissions: read-all

jobs:
  unit-test:
    name: Unit tests on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Cache puzzles database
        id: cache-puzzles
        uses: actions/cache@v3
        with:
          path: assets/puzzles.db
          key: puzzles-db-${{ hashFiles('scripts/generate_puzzles_db.py', 'scripts/download_and_extract_puzzles.sh') }}

      - name: Generate puzzles database
        if: steps.cache-puzzles.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update && sudo apt-get install -y zstd
          pip3 install zstandard
          mkdir -p assets
          ./scripts/download_and_extract_puzzles.sh

      - name: Generate openings database
        run: |
          mkdir -p assets/openings
          python3 scripts/generate_openings_db.py assets/openings.json assets/openings/openings.db

      - name: 🐦 Install flutter
        uses: subosito/flutter-action@v2
        with:
          cache: true
          flutter-version: 3.44.1

      - name: Install requirements for sqflite_common_ffi package
        run: sudo apt-get -y install libsqlite3-0 libsqlite3-dev

      - name: Install dependencies
        run: flutter pub get

      - name: Code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze project source
        run: flutter analyze

      # - name: Run riverpod lint
      #   run: dart run custom_lint

      - name: Run unit tests
        run: flutter test
