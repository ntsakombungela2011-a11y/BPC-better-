name: Builds
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag to create after the APK build finishes (for example: v0.4.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.1
      - run: flutter doctor -v

      - name: Checkout mobile code
        uses: actions/checkout@v4

      - name: Cache puzzles database
        id: cache-puzzles
        uses: actions/cache@v3
        with:
          path: assets/puzzles.db
          key: puzzles-db-${{ hashFiles('scripts/generate_puzzles_db.py', 'scripts/download_and_extract_puzzles.sh') }}

      - name: Generate puzzles database
        if: steps.cache-puzzles.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update && sudo apt-get install -y zstd
          pip3 install zstandard
          mkdir -p assets
          ./scripts/download_and_extract_puzzles.sh

      - name: Generate openings database
        run: |
          mkdir -p assets/openings
          python3 scripts/generate_openings_db.py assets/openings.json assets/openings/openings.db

      - name: Install dependencies
        run: flutter pub get

      - name: Code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-debug.apk lichess-mobile.apk

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.version }}
          draft: true
          prerelease: false
          generate_release_notes: true
          files: lichess-mobile.apk
