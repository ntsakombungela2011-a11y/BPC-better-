<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#0a1628"/>
  
  <!-- Train nose (front) - curved pointed shape -->
  <path d="M256 60 L320 60 Q400 60 400 140 L400 180 Q400 200 380 220 L340 260 L340 400 L320 400 L320 420 L300 420 L300 400 L260 400 L260 420 L240 420 L240 400 L212 400 L212 420 L192 420 L192 400 L172 400 L172 420 L152 420 L152 400 L112 400 L112 260 L72 220 Q52 200 52 180 L52 140 Q52 60 132 60 Z" fill="#1a2744"/>
  
  <!-- White accent stripe -->
  <rect x="52" y="200" width="348" height="20" fill="#ffffff"/>
  
  <!-- Blue accent stripe (instead of orange) -->
  <rect x="52" y="170" width="348" height="12" fill="#2196f3"/>
  
  <!-- Train windows -->
  <rect x="180" y="230" width="40" height="30" rx="4" fill="#ffffff"/>
  <rect x="240" y="230" width="40" height="30" rx="4" fill="#ffffff"/>
  <rect x="300" y="230" width="40" height="30" rx="4" fill="#ffffff"/>
  
  <!-- Headlights -->
  <circle cx="130" cy="300" r="15" fill="#ffd700"/>
  <circle cx="130" cy="300" r="8" fill="#ffffff"/>
  
  <!-- Train body outline -->
  <path d="M256 60 L320 60 Q400 60 400 140 L400 180 Q400 200 380 220 L340 260 L340 400 L320 400 L320 420 L300 420 L300 400 L260 400 L260 420 L240 420 L240 400 L212 400 L212 420 L192 420 L192 400 L172 400 L172 420 L152 420 L152 400 L112 400 L112 260 L72 220 Q52 200 52 180 L52 140 Q52 60 132 60 Z" fill="none" stroke="#ffffff" stroke-width="4"/>
</svg>